name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=apts-agents

      - name: Purge Cloudflare cache
        run: |
          # Look up the zone ID for datameister.jp
          ZONE_ID=$(curl -s -X GET "https://api.cloudflare.com/client/v4/zones?name=datameister.jp" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" | jq -r '.result[0].id')

          if [ "$ZONE_ID" = "null" ] || [ -z "$ZONE_ID" ]; then
            echo "⚠️ Could not find zone ID for datameister.jp — skipping cache purge"
            exit 0
          fi

          echo "Purging cache for zone $ZONE_ID (datameister.jp)..."
          RESULT=$(curl -s -X POST "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"prefixes":["clients.datameister.jp/aptsjp"]}')
          echo "$RESULT" | jq .
          SUCCESS=$(echo "$RESULT" | jq -r '.success')
          if [ "$SUCCESS" != "true" ]; then
            echo "❌ Cache purge failed"
            exit 1
          fi
          echo "✅ Cache purged successfully"
